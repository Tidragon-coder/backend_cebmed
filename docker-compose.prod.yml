services:
  migrate:
    build:
      context: .
      target: deps
    command: npx prisma migrate deploy
    env_file:
      - .env
    restart: "no"

  api:
    build:
      context: .
      target: production
    ports:
      - "3001:3000"
    env_file:
      - .env
    volumes:
      - documents_storage:/app/storage/documents
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  documents_storage:
