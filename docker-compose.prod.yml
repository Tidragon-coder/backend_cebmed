services:
  api:
    build:
      context: .
      target: production
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - documents_storage:/app/storage/documents
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

volumes:
  documents_storage:
